name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Setup Python (if needed)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install dependencies
      - name: Install Dependencies
        run: npm install

      # Run tests
      - name: Run Tests
        run: npm test

      # Generate report
      - name: Generate Validation Report
        run: |
          mkdir -p reports
          echo "Validation Successful" > reports/report.txt

      # Upload artifacts
      - name: Upload Validation Evidence
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: reports/
